!yisp &template-props
- schema
- type: object
  properties:
    repo:
      type: string
    release:
      type: string
    version:
      type: string
    values:
      type: any

---
!yisp &template
- lambda
- [!template-props props]
- - go-run
  - pkg: github.com/totegamma/yisp-helm-adapter@v0.1.0
    args: !quote
      - *props.repo
      - *props.release
      - *props.version
    stdin:
      - to-yaml
      - *props.values

